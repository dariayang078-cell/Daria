<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>运动打卡热力图</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #ffffff;
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
    padding: 20px 24px;
    color: #1a1a1a;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .title {
    font-size: 15px;
    font-weight: 500;
    color: #1a1a1a;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stats-row {
    display: flex;
    gap: 20px;
  }

  .stat { text-align: center; }

  .stat-num {
    font-size: 18px;
    font-weight: 500;
    color: #216e39;
    line-height: 1;
  }

  .stat-label {
    font-size: 10px;
    color: #888;
    margin-top: 2px;
  }

  .year-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }

  .year-btn {
    background: none;
    border: 1px solid #d0d7de;
    color: #555;
    width: 22px;
    height: 22px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .year-btn:hover { background: #f6f8fa; }
  .year-text { font-size: 12px; color: #555; min-width: 36px; text-align: center; }

  .heatmap-scroll { overflow-x: auto; padding-bottom: 4px; }

  .heatmap-table { display: flex; gap: 2px; min-width: fit-content; }

  .month-block { display: flex; flex-direction: column; }

  .month-name {
    font-size: 10px;
    color: #888;
    margin-bottom: 4px;
    height: 14px;
    line-height: 14px;
  }

  .month-grid {
    display: grid;
    grid-template-columns: repeat(7, 11px);
    gap: 2px;
  }

  .cell {
    width: 11px;
    height: 11px;
    border-radius: 2px;
    cursor: pointer;
  }

  .cell:hover { opacity: 0.7; }
  .cell.l0 { background: #ebedf0; }
  .cell.l4 { background: #216e39; }
  .cell.today { outline: 1.5px solid #1a1a1a; outline-offset: 1px; }
  .cell.future { background: #f5f5f5; cursor: default; pointer-events: none; }
  .cell.empty { background: transparent; cursor: default; pointer-events: none; }

  .bottom-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .info-text { font-size: 10px; color: #888; }
  .info-text span { color: #216e39; font-weight: 500; }

  .legend { display: flex; align-items: center; gap: 3px; }
  .legend-label { font-size: 10px; color: #888; }
  .legend-cell { width: 11px; height: 11px; border-radius: 2px; }

  .hint { font-size: 10px; color: #aaa; margin-bottom: 14px; }

  .tooltip-box {
    position: fixed;
    background: #24292f;
    color: #fff;
    font-size: 11px;
    padding: 5px 8px;
    border-radius: 5px;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.1s;
  }
</style>
</head>
<body>

<div class="header">
  <div class="title">🏃 运动打卡记录</div>
  <div class="stats-row">
    <div class="stat">
      <div class="stat-num" id="s-total">0</div>
      <div class="stat-label">累计天数</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="s-streak">0</div>
      <div class="stat-label">连续打卡</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="s-month">0</div>
      <div class="stat-label">本月天数</div>
    </div>
  </div>
</div>

<div class="hint">点击格子打卡 · 再次点击取消 · 数据自动保存</div>

<div class="year-nav">
  <button class="year-btn" id="btn-prev">‹</button>
  <span class="year-text" id="year-label">2026</span>
  <button class="year-btn" id="btn-next">›</button>
</div>

<div class="heatmap-scroll">
  <div class="heatmap-table" id="heatmap"></div>
</div>

<div class="bottom-row">
  <div class="info-text">连续最长 <span id="s-max">0</span> 天 &nbsp;·&nbsp; 今年完成率 <span id="s-rate">0%</span></div>
  <div class="legend">
    <span class="legend-label">少&nbsp;</span>
    <div class="legend-cell" style="background:#ebedf0"></div>
    <div class="legend-cell" style="background:#9be9a8"></div>
    <div class="legend-cell" style="background:#40c463"></div>
    <div class="legend-cell" style="background:#30a14e"></div>
    <div class="legend-cell" style="background:#216e39"></div>
    <span class="legend-label">&nbsp;多</span>
  </div>
</div>

<div class="tooltip-box" id="tip"></div>

<script>
const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const KEY = 'habit_v2';
let year = new Date().getFullYear();
let data = {};

function load() { try { data = JSON.parse(localStorage.getItem(KEY)||'{}'); } catch(e) { data={}; } }
function save() { localStorage.setItem(KEY, JSON.stringify(data)); }
function dk(y,m,d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

const today = new Date();
const todayKey = dk(today.getFullYear(), today.getMonth(), today.getDate());

function cellClass(key, checked) {
  if (key > todayKey) return 'cell future';
  let c = 'cell ' + (checked ? 'l4' : 'l0');
  if (key === todayKey && !checked) c += ' today';
  return c;
}

function build() {
  const map = document.getElementById('heatmap');
  map.innerHTML = '';
  for (let m = 0; m < 12; m++) {
    const block = document.createElement('div');
    block.className = 'month-block';
    const lbl = document.createElement('div');
    lbl.className = 'month-name';
    lbl.textContent = MONTHS[m];
    block.appendChild(lbl);
    const grid = document.createElement('div');
    grid.className = 'month-grid';
    const firstDow = new Date(year, m, 1).getDay();
    for (let i = 0; i < firstDow; i++) {
      const e = document.createElement('div');
      e.className = 'cell empty';
      grid.appendChild(e);
    }
    const days = new Date(year, m+1, 0).getDate();
    for (let d = 1; d <= days; d++) {
      const key = dk(year, m, d);
      const cell = document.createElement('div');
      cell.className = cellClass(key, !!data[key]);
      cell.addEventListener('click', () => {
        if (key > todayKey) return;
        data[key] = !data[key];
        if (!data[key]) delete data[key];
        save();
        cell.className = cellClass(key, !!data[key]);
        updateStats();
      });
      cell.addEventListener('mouseenter', e => {
        const tip = document.getElementById('tip');
        const lbl = data[key] ? '✅ 已打卡' : (key === todayKey ? '👆 点击打卡' : '未打卡');
        tip.textContent = `${year}年${m+1}月${d}日  ${lbl}`;
        tip.style.opacity = '1';
        moveTip(e);
      });
      cell.addEventListener('mousemove', moveTip);
      cell.addEventListener('mouseleave', () => { document.getElementById('tip').style.opacity='0'; });
      grid.appendChild(cell);
    }
    block.appendChild(grid);
    map.appendChild(block);
  }
}

function moveTip(e) {
  const t = document.getElementById('tip');
  t.style.left = (e.clientX+12)+'px';
  t.style.top = (e.clientY-30)+'px';
}

function updateStats() {
  const allDone = Object.keys(data).filter(k => data[k]);
  document.getElementById('s-total').textContent = allDone.length;
  const ym = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
  document.getElementById('s-month').textContent = allDone.filter(k => k.startsWith(ym)).length;
  let streak=0, d=new Date();
  while(true) { const k=dk(d.getFullYear(),d.getMonth(),d.getDate()); if(data[k]){streak++;d.setDate(d.getDate()-1);}else break; }
  document.getElementById('s-streak').textContent = streak;
  const sorted = allDone.sort();
  let max=0, cur=0, prev=null;
  sorted.forEach(k => { if(prev){const diff=(new Date(k)-new Date(prev))/86400000; cur=diff===1?cur+1:1;}else cur=1; if(cur>max)max=cur; prev=k; });
  document.getElementById('s-max').textContent = max;
  const yStr = String(year);
  const yearDone = allDone.filter(k=>k.startsWith(yStr)).length;
  const start=new Date(year,0,1), end=year===today.getFullYear()?today:new Date(year,11,31);
  const total=Math.floor((end-start)/86400000)+1;
  document.getElementById('s-rate').textContent = total>0?Math.round(yearDone/total*100)+'%':'0%';
}

document.getElementById('btn-prev').onclick = () => { year--; document.getElementById('year-label').textContent=year; build(); updateStats(); };
document.getElementById('btn-next').onclick = () => { year++; document.getElementById('year-label').textContent=year; build(); updateStats(); };

load(); build(); updateStats();
document.getElementById('year-label').textContent = year;
</script>
</body>
</html>
